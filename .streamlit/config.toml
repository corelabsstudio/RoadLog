[theme]
primaryColor = "#0D9488"
backgroundColor = "#F3F4F6"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"
base = "light"

[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = true
